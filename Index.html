<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lars VFX | Liquid Glass Portfolio</title>

<style>
/* ===== BACKGROUND ===== */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: white;
  background: radial-gradient(circle at top, #1a1a2e, #000);
  overflow-x: hidden;
}

/* animated glow blobs */
.blob {
  position: fixed;
  width: 400px;
  height: 400px;
  filter: blur(120px);
  opacity: 0.4;
  border-radius: 50%;
  z-index: -1;
  animation: float 10s infinite ease-in-out;
}

.blob.one { background: #7c3aed; top: -100px; left: -100px; }
.blob.two { background: #06b6d4; bottom: -120px; right: -120px; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(40px); }
}

/* ===== GLASS EFFECT ===== */
.glass {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* ===== HEADER ===== */
header {
  text-align: center;
  padding: 80px 20px;
}

h1 {
  font-size: 60px;
  margin: 0;
  letter-spacing: 3px;
}

.subtitle {
  color: #bbb;
  margin-top: 10px;
}

/* ===== SECTION ===== */
section {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

/* ===== VIDEO CARD ===== */
.card {
  padding: 15px;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.03);
}

iframe {
  width: 100%;
  height: 220px;
  border-radius: 15px;
  border: none;
}

/* ===== BUTTON ===== */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 22px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(255,255,255,0.2);
}

/* ===== ABOUT ===== */
.about {
  text-align: center;
  margin-top: 20px;
  color: #ccc;
}

/* footer */
footer {
  text-align: center;
  padding: 40px;
  color: #666;
}
</style>
</head>

<body>

<div class="blob two"></div>
