<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lars VFX | Portfolio</title>

<style>
* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #0b0b14, #000);
  color: white;
  overflow-x: hidden;
}

}

.glass {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

header {
  text-align: center;
  padding: 80px 20px;
}

h1 {
  font-size: clamp(42px, 8vw, 60px);
  margin: 0;
  letter-spacing: 3px;
}

.subtitle {
  color: #bbb;
  margin-top: 10px;
  font-size: 1.05rem;
}

section {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

h2 {
  text-align: center;
  margin-bottom: 24px;
  font-size: clamp(28px, 4vw, 36px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.card,
.thumb-card {
  padding: 15px;
  transition: transform 0.3s ease;
}

.card:hover,
.thumb-card:hover {
  transform: scale(1.03);
}

iframe,
.thumb {
  width: 100%;
  height: 220px;
  border-radius: 15px;
  border: none;
  object-fit: cover;
}

.btn {
  display: inline-block;
  margin: 10px 8px 0;
  padding: 12px 22px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(255,255,255,0.2);
}

.about {
  text-align: center;
  color: #ccc;
  padding: 32px 24px;
}

.about p {
  max-width: 760px;
  margin: 0 auto;
  line-height: 1.7;
}

footer {
  text-align: center;
  padding: 40px;
  color: #666;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }

  iframe,
  .thumb {
    height: 210px;
  }
}
</style>
</head>

<body>

<header>
  <h1>LARS VFX</h1>
  <div class="subtitle">VFX • Indents • Montages • Editing Software • Thumbnails</div>
  <a class="btn" href="#work">Portfolio</a>
  <a class="btn" href="#thumbnails">Thumbnails</a>
</header>

<section class="glass about">
  <h2>About Lars VFX</h2>
  <p>Nummer 1 VFX Shop van Nederland!</p>
</section>

<section id="work">
  <h2>Projects</h2>
  <div class="grid">
    <div class="glass card"><iframe src="https://www.youtube.com/embed/N7vpbeXD9vY" allowfullscreen></iframe></div>
    <div class="glass card"><iframe src="https://www.youtube.com/embed/pd6nv-I5F_4" allowfullscreen></iframe></div>
    <div class="glass card"><iframe src="https://www.youtube.com/embed/a47zbq367qY" allowfullscreen></iframe></div>
    <div class="glass card"><iframe src="https://www.youtube.com/embed/hBNRPI55WwM" allowfullscreen></iframe></div>
    <div class="glass card"><iframe src="https://www.youtube.com/embed/_IdQ169qETU" allowfullscreen></iframe></div>
    <div class="glass card"><iframe src="https://www.youtube.com/embed/_q_p6vjaB-0" allowfullscreen></iframe></div>
    <div class="glass card"><iframe src="https://www.youtube.com/embed/zTsws8_Yvhs" allowfullscreen></iframe></div>
    <div class="glass card"><iframe src="https://www.youtube.com/embed/GpGtei5CbOw" allowfullscreen></iframe></div>
  </div>
</section>

<section id="thumbnails">
  <h2>Thumbnails</h2>
  <div class="grid">
    <div class="glass thumb-card">
      <img class="thumb" src="https://cdn.discordapp.com/attachments/1496483719676956672/1496487430281236601/image.png" />
    </div>
    <div class="glass thumb-card">
      <img class="thumb" src="https://cdn.discordapp.com/attachments/1496483719676956672/1496487236932210788/3_Vertex_Lars.png" />
    </div>
    <div class="glass thumb-card">
      <img class="thumb" src="https://cdn.discordapp.com/attachments/1496483719676956672/1496486265196118017/IMG_2926.png" />
    </div>
  </div>
</section>

<footer>
  © 2026 Lars VFX
</footer>

</body>
</html>
