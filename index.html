<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lars VFX | Portfolio</title>

<style>
* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #0b0b14, #000);
  color: white;
  overflow-x: hidden;
  cursor: default;
}

a,
button,
.card,
.thumb-card,
iframe,
img {
  cursor: pointer;
}

.blob {
  position: fixed;
  width: 500px;
  height: 500px;
  filter: blur(140px);
  opacity: 0.35;
  border-radius: 50%;
  z-index: -1;
  animation: float 12s infinite ease-in-out;
}

.blob.one { background: #7c3aed; top: -150px; left: -150px; }
.blob.two { background: #06b6d4; bottom: -150px; right: -150px; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(60px); }
}

.glass {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

header {
  text-align: center;
  padding: 80px 20px;
}

h1 {
  font-size: clamp(42px, 8vw, 60px);
  margin: 0;
  letter-spacing: 3px;
}

.subtitle {
  color: #bbb;
  margin-top: 10px;
  font-size: 1.05rem;
}

.nav {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 20px;
}

section {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

h2 {
  text-align: center;
  margin-bottom: 24px;
  font-size: clamp(28px, 4vw, 36px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.card,
.thumb-card {
  padding: 15px;
  transition: transform 0.3s ease;
}

.card:hover,
.thumb-card:hover {
  transform: scale(1.03);
}

iframe,
.thumb {
  width: 100%;
  height: 220px;
  border-radius: 15px;
  border: none;
  object-fit: cover;
  display: block;
}

.btn {
  display: inline-block;
  margin: 10px 8px 0;
  padding: 12px 22px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(255,255,255,0.2);
}

.about,
.socials {
  text-align: center;
  padding: 32px 24px;
}

.about p {
  max-width: 760px;
  margin: 0 auto;
  line-height: 1.7;
  color: #ccc;
}

.social-buttons {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 10px;
}

footer {
  text-align: center;
  padding: 40px;
  color: #666;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }

  iframe,
  .thumb {
    height: 210px;
  }
}
</style>
</head>
