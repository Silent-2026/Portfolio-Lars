<!-- status.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lars Status</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #0b0b14, #000);
  color: white;
  overflow-x: hidden;
}

/* Background blobs */
.blob {
  position: fixed;
  width: 500px;
  height: 500px;
  filter: blur(140px);
  opacity: 0.35;
  border-radius: 50%;
  z-index: -1;
  animation: float 12s infinite ease-in-out;
}

.blob.one { background: #7c3aed; top: -150px; left: -150px; }
.blob.two { background: #06b6d4; bottom: -150px; right: -150px; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(60px); }
}

/* Glass style */
.glass {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* HEADER (smaller now) */
header {
  padding: 40px 20px 20px;
  text-align: center;
  max-width: 700px;
  margin: 40px auto 0;
}

h1 {
  margin: 0;
  font-size: clamp(34px, 5vw, 52px);
  letter-spacing: 2px;
}

.subtitle {
  color: #aaa;
  margin-top: 10px;
  font-size: 16px;
}

/* Status banner */
.status-banner {
  margin: 30px auto;
  max-width: 900px;
  text-align: center;
  padding: 20px;
  border-radius: 14px;
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3);
  color: #22c55e;
  font-weight: 600;
}

/* Sections */
.section {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* Optional glass wrap */
.section.glass {
  padding: 25px;
}

.category-title {
  margin: 40px 0 15px;
  font-size: 20px;
  color: #bbb;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 8px;
}

/* Items */
.item {
  display: flex;
  justify-content: space-between;
  padding: 14px 16px;
  margin-bottom: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
}

/* Status dot */
.status {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 10px #22c55e;
}

/* Footer */
footer {
  text-align: center;
  padding: 40px;
  color: #555;
}

</style>
</head>

<body>

<div class="blob one"></div>
<div class="blob two"></div>

<header class="glass">
  <h1>LARS STATUS</h1>
  <div class="subtitle">De officiële status van Lars VFX</div>
</header>

<div class="status-banner glass">
  All Systems Operational
</div>

<div class="section glass">

  <div class="category-title">Website</div>

  <div class="item">
    <span>Portfolio Website</span>
    <span class="status">
      <span class="dot"></span>
      Online
    </span>
  </div>

  <div class="item">
    <span>Reviews Page</span>
    <span class="status">
      <span class="dot"></span>
      Online
    </span>
  </div>

</div>

<footer>
  © 2026 Lars VFX
</footer>

</body>
</html>
