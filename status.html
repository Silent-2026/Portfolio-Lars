<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lars Status</title>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0b0b14;
  color: white;
}

header {
  padding: 70px 20px 30px;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 48px;
  letter-spacing: 2px;
}

.subtitle {
  color: #aaa;
  margin-top: 10px;
  font-size: 16px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
}

.status-banner {
  margin: 30px auto;
  max-width: 900px;
  text-align: center;
  padding: 20px;
  border-radius: 14px;
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3);
  color: #22c55e;
  font-weight: 600;
}

.section {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.category-title {
  margin: 40px 0 15px;
  font-size: 20px;
  color: #bbb;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 8px;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 14px 16px;
  margin-bottom: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
}

.status {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 10px #22c55e;
}

footer {
  text-align: center;
  padding: 40px;
  color: #555;
}

</style>
</head>
<body>

<header>
  <h1>LARS STATUS</h1>
  <div class="subtitle">De officiele status van Lars VFX</div>
</header>

<div class="status-banner">
All Systems Operational
</div>

<div class="section">

  <div class="category-title">Website</div>

  <div class="item">
    <span>https://silent-2026.github.io/Portfolio-Lars/index.html</span>
    <span class="status">
      <span class="dot"></span>
      Online
    </span>
  </div>

  <div class="item">
    <span>https://silent-2026.github.io/Portfolio-Lars/reviews.html</span>
    <span class="status">
      <span class="dot"></span>
      Online
    </span>
  </div>

</div>

<footer>© 2026 Lars vfx</footer>

</body>
</html>
